# Example pipeline config — Model Features ETL
# Used by the Snowflake ETL Framework
# Add this to your configs/ folder and the DAG factory auto-generates the Airflow DAG.

name:           Model_features_etl
source_s3_path: s3://data-lake/Model-features/daily/
target_table:   ANALYTICS.PUBLIC.Model_FEATURES
staging_table:  ANALYTICS.STAGING.Model_FEATURES_STAGE
merge_key:      Model_ID
file_format:    PARQUET
schedule:       "0 2 * * *"   # Daily at 2am UTC
sla_minutes:    45
owner:          sobila.satheesh
tags:
  - Model
  - recommendation-model
  - daily

quality_checks:
  - name:      no_null_Model_ids
    sql: |
      SELECT Model_id FROM ANALYTICS.STAGING.Model_FEATURES_STAGE
      WHERE Model_id IS NULL
    severity:  error

  - name:      no_null_specialties
    sql: |
      SELECT Model_id FROM ANALYTICS.STAGING.Model_FEATURES_STAGE
      WHERE specialty IS NULL OR specialty = ''
    severity:  warning

  - name:      valid_npi_format
    sql: |
      SELECT Model_id, npi FROM ANALYTICS.STAGING.Model_FEATURES_STAGE
      WHERE NOT REGEXP_LIKE(npi::VARCHAR, '^[0-9]{10}$')
    severity:  error

  - name:      no_future_dates
    sql: |
      SELECT Model_id, effective_date FROM ANALYTICS.STAGING.Model_FEATURES_STAGE
      WHERE effective_date > CURRENT_DATE()
    severity:  warning
